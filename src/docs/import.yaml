tags:
  - name: Import
    description: Importer une manifestation complète depuis l'API fédérale
  - name: Exports
    description: Génération et téléchargement de documents PDF (start list, pesée, etc.)

paths:
  /import/manifestations:
    get:
      tags: [Import]
      summary: Liste des manifestations FFAviron (proxy intranet)
      description: |
        Interroge `https://intranet.ffaviron.fr/api/v1/manifestations` avec le jeton serveur
        `EXTERNAL_API_TOKEN`. Retourne une liste allégée pour sélection / filtres (id, libelle,
        type avec disciplines, structure, type mer/rivière depuis `details_type`, dates).
        Par défaut `par_page=200` (max 500). Utiliser `fetch_all=true` pour enchaîner les pages
        jusqu’à la dernière (limite de sécurité côté serveur).

        Les filtres ci‑dessous sont **relays tels quels** vers l’intranet (mêmes noms / formats que la doc FFA).
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: date_debut
          required: false
          schema:
            type: string
            format: date
            example: "2026-05-01"
          description: Date de début de manifestation (yyyy-mm-dd), filtre côté intranet
        - in: query
          name: date_fin
          required: false
          schema:
            type: string
            format: date
            example: "2026-08-31"
          description: Date de fin de manifestation (yyyy-mm-dd), filtre côté intranet
        - in: query
          name: modele_id
          required: false
          schema:
            type: integer
          description: Type de manifestation (id modèle, voir doc FFA `/modeles-manifestations`)
        - in: query
          name: structure_id
          required: false
          schema:
            type: integer
          description: Organisateur (structure ou enfant)
        - in: query
          name: discipline_code
          required: false
          schema:
            type: string
          description: Code discipline (via le modèle)
        - in: query
          name: tour_id
          required: false
          schema:
            type: integer
          description: Id de tour (voir doc FFA `/tours`)
        - in: query
          name: include
          required: false
          schema:
            type: string
          description: >
            Champs additionnels demandés à l’intranet, séparés par des virgules **sans espaces**
            (ex. `lieu_de_pratique,details,epreuves`)
        - in: query
          name: par_page
          required: false
          schema:
            type: integer
            default: 200
            minimum: 1
            maximum: 500
          description: Taille de page côté intranet (équivalent `par_page` FFA)
        - in: query
          name: page
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
          description: Ignoré si `fetch_all=true`
        - in: query
          name: fetch_all
          required: false
          schema:
            type: boolean
            default: false
          description: Si true, récupère toutes les pages successivement
      responses:
        200:
          description: Liste des manifestations
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        libelle:
                          type: string
                          nullable: true
                        nom:
                          type: string
                          nullable: true
                          description: Alias de libelle (filtre / affichage)
                        structure:
                          type: object
                          nullable: true
                          properties:
                            nom:
                              type: string
                              nullable: true
                            code:
                              type: string
                              nullable: true
                        type:
                          type: object
                          nullable: true
                          properties:
                            id:
                              type: integer
                            libelle:
                              type: string
                              nullable: true
                            disciplines:
                              type: array
                              items:
                                type: object
                        details_type:
                          type: object
                          nullable: true
                          properties:
                            code:
                              type: string
                              example: MER
                            libelle:
                              type: string
                              example: Mer
                        date_debut:
                          type: string
                          nullable: true
                        date_fin:
                          type: string
                          nullable: true
                  meta:
                    type: object
        502:
          description: Erreur réseau ou réponse invalide de l’intranet
        503:
          description: Token serveur FFA non configuré

  /import/manifestation/{id}:
    post:
      tags: [Import]
      summary: Importer un événement avec ses épreuves, participants et bateaux
      description: |
        Crée un nouvel événement complet avec toutes les catégories, équipages et participants
        depuis l'API FFAviron. Cette route crée un nouvel événement.
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: ID de la manifestation dans l'API source
      responses:
        201:
          description: Importation réussie
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      event_id:
                        type: string
                      name:
                        type: string

  /import/manifestation/{id}/update:
    post:
      tags: [Import]
      summary: Mettre à jour un événement existant depuis l'API FFAviron
      description: |
        Met à jour un événement existant en ajoutant uniquement les nouveaux éléments
        (catégories, participants, équipages) sans toucher à l'existant.
        Cette route ne supprime rien et ne duplique pas les données existantes.
        Les courses, phases et autres données déjà créées ne sont pas affectées.
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: ID de la manifestation dans l'API source
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [event_id]
              properties:
                event_id:
                  type: string
                  format: uuid
                  description: ID de l'événement à mettre à jour
      responses:
        200:
          description: Événement mis à jour avec succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: "Événement mis à jour avec succès"
                  data:
                    type: object
                    properties:
                      event_id:
                        type: string
                        format: uuid
                      name:
                        type: string
                      new_categories_count:
                        type: integer
                        description: Nombre de nouvelles catégories créées
                      new_crews_count:
                        type: integer
                        description: Nombre de nouveaux équipages créés
                      new_participants_count:
                        type: integer
                        description: Nombre de nouveaux participants créés
                      total_participants_count:
                        type: integer
                        description: Nombre total de participants liés aux nouveaux équipages
                      new_distances_count:
                        type: integer
                        description: Nombre de nouvelles distances créées
                      new_categories:
                        type: array
                        description: Détails complets des nouvelles catégories créées
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                              format: uuid
                            code:
                              type: string
                            label:
                              type: string
                            age_group:
                              type: string
                              nullable: true
                            gender:
                              type: string
                            boat_seats:
                              type: integer
                              nullable: true
                            has_coxswain:
                              type: boolean
                            distance_id:
                              type: string
                              format: uuid
                              nullable: true
                      new_distances:
                        type: array
                        description: Détails complets des nouvelles distances créées
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                              format: uuid
                            meters:
                              type: integer
                            is_relay:
                              type: boolean
                            relay_count:
                              type: integer
                              nullable: true
                            label:
                              type: string
                      new_crews:
                        type: array
                        description: Détails complets des nouveaux équipages créés
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                              format: uuid
                            category_id:
                              type: string
                              format: uuid
                            category_code:
                              type: string
                            category_label:
                              type: string
                            club_name:
                              type: string
                            club_code:
                              type: string
                            status:
                              type: integer
                      new_participants:
                        type: array
                        description: Détails complets des nouveaux participants créés
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                              format: uuid
                            first_name:
                              type: string
                            last_name:
                              type: string
                            license_number:
                              type: string
                              nullable: true
                            gender:
                              type: string
                            club_name:
                              type: string
                            crew_id:
                              type: string
                              format: uuid
                            crew_club:
                              type: string
                            is_coxswain:
                              type: boolean
                            seat_position:
                              type: integer
                              nullable: true
        400:
          description: Paramètres invalides (event_id manquant)
        404:
          description: Événement introuvable
        500:
          description: Erreur lors de la mise à jour

  /exports/startlist/phase/{phase_id}:
    get:
      tags: [Exports]
      summary: Exporter la start list d'une phase au format PDF
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: phase_id
          required: true
          schema:
            type: string
          description: ID de la phase
      produces:
        - application/pdf
      responses:
        200:
          description: Fichier PDF de la start list
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        404:
          description: Phase non trouvée

  /exports/weighin/phase/{phase_id}:
    get:
      tags: [Exports]
      summary: Exporter la liste de pesée d'une phase au format PDF
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: phase_id
          required: true
          schema:
            type: string
          description: ID de la phase
      produces:
        - application/pdf
      responses:
        200:
          description: Fichier PDF de la pesée
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        404:
          description: Phase non trouvée

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
